<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4K高清肌水光療程 內部考核系統</title>
    <style>
        :root {
            --primary: #cba052;
            --primary-light: #fdfaf4;
            --dark: #333333;
            --gray: #f5f5f5;
            --success: #28a745;
            --danger: #dc3545;
            --bg-color: #f0f2f5;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--dark);
            line-height: 1.6;
            margin: 0;
            padding: 20px 10px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: var(--primary);
            border-bottom: 2px solid var(--primary-light);
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-size: 1.8em;
        }
        .info-bar {
            background: var(--primary-light);
            padding: 15px 20px;
            border-radius: 10px;
            border-left: 5px solid var(--primary);
            margin-bottom: 30px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #8c6a2c;
        }
        .question-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            transition: transform 0.2s ease;
        }
        .question-card:hover {
            border-color: #dcdcdc;
        }
        .question-title {
            font-size: 1.15em;
            font-weight: bold;
            margin-bottom: 18px;
            color: #222;
        }
        .section-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-bottom: 15px;
            font-weight: 500;
        }
        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 650px) {
            .options-container {
                grid-template-columns: 1fr;
            }
            .info-bar {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
        .option-label {
            display: flex;
            align-items: center;
            background: var(--gray);
            padding: 14px 16px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95em;
        }
        .option-label:hover {
            background: var(--primary-light);
        }
        /* Hide the default radio button */
        .option-label input[type="radio"] {
            display: none;
        }
        /* Custom radio button */
        .custom-radio {
            width: 20px;
            height: 20px;
            border: 2px solid #ccc;
            border-radius: 50%;
            margin-right: 12px;
            display: inline-block;
            position: relative;
            flex-shrink: 0;
        }
        .option-label input[type="radio"]:checked + .custom-radio {
            border-color: var(--primary);
        }
        .option-label input[type="radio"]:checked + .custom-radio::after {
            content: '';
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .option-label.selected {
            border-color: var(--primary);
            background: var(--primary-light);
            font-weight: bold;
            color: var(--primary);
        }
        .btn-submit {
            display: block;
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.2em;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s, transform 0.1s;
            margin-top: 20px;
        }
        .btn-submit:hover {
            background: #b58b42;
        }
        .btn-submit:active {
            transform: scale(0.98);
        }
        #error-msg {
            display: none;
            background: #fde7e9;
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            border: 1px solid #f8cacedc;
        }
        #result-container {
            display: none;
            text-align: center;
            margin-top: 40px;
            padding: 40px 20px;
            border-radius: 12px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .score-text {
            font-size: 4em;
            font-weight: 900;
            margin: 15px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .pass { background: linear-gradient(135deg, #e6f4ea 0%, #c8e6c9 100%); color: #1e7e34; border: 1px solid #c3e6cb; }
        .fail { background: linear-gradient(135deg, #fde7e9 0%, #f8d7da 100%); color: #bd2130; border: 1px solid #f5c6cb; }
        
        .explanation {
            display: none;
            margin-top: 20px;
            padding: 16px;
            background: #f8f9fa;
            border-left: 5px solid #17a2b8;
            border-radius: 6px;
            font-size: 0.95em;
        }
        .correct-ans { color: var(--success); font-weight: bold; display: flex; align-items: center; gap: 8px; margin-bottom: 8px;}
        .wrong-ans { color: var(--danger); font-weight: bold; margin-bottom: 8px;}
        .exp-text { margin-top: 10px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>4K高清肌水光療程 考核測驗</h1>
    <div class="info-bar">

        <span>🎯 及格標準：90 分 / 100 分</span>
    </div>

    <form id="quiz-form">
        <div id="questions-wrapper"></div>
        <div id="error-msg">⚠ 請確認所有題目皆已作答完畢！</div>
        <button type="button" class="btn-submit" id="submit-btn" onclick="submitQuiz()">送出考卷並觀看解析</button>
    </form>

    <div id="result-container">
        <h2 id="result-status" style="margin: 0; font-size: 1.5em;"></h2>
        <div class="score-text" id="final-score"></div>
        <p id="result-msg" style="font-size: 1.1em; margin-bottom: 30px;"></p>
        <button type="button" class="btn-submit" style="max-width: 300px; margin: 0 auto; background: #fff; color: var(--dark); border: 2px solid var(--dark);" onclick="location.reload()">重新挑戰測驗</button>
    </div>
</div>
