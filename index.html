        {
            q: "關於向榮外泌體的功效實驗數據，下列哪一項敘述是不正確的？",
            options: ["彈力蛋白分泌增加95%", "膠原蛋白分泌增加31%", "抑制黑色素生成下降22%", "水分吸收率增加100%"],
            ans: 3,
            exp: "簡報提及的具體實驗數據為彈力蛋白增加95%、膠原蛋白增加31%、黑色素下降22%，並無水分吸收率增加的數據。"
        },
        {
            q: "術後會提供客人的「術後護理包」裡面，標準包含哪些物品？",
            options: ["止痛藥、抗生素、紗布", "棉棒、紗布、紅癢藥膏、生理食鹽水", "洗面乳、化妝水、防曬乳", "壓力球、紓壓小物、透氣膠帶"],
            ans: 1,
            exp: "SOP中明訂，提供給客人的術後護理包包含：棉棒、紗布、紅癢藥膏、生理食鹽水。"
        }
    ]
};

let selectedQuestions = [];

function generateQuiz() {
    selectedQuestions = [];
    let qIndex = 0;
    const wrapper = document.getElementById('questions-wrapper');
    wrapper.innerHTML = '';

    for (const [section, questions] of Object.entries(questionBank)) {
        const shuffled = [...questions].sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, 2);
        
        selected.forEach(q => {
            selectedQuestions.push({...q, section});
            
            const qDiv = document.createElement('div');
            qDiv.className = 'question-card';
            
            let optionsHTML = '';
            q.options.forEach((opt, i) => {
                optionsHTML += `
                    <label class="option-label" id="label-q${qIndex}-opt${i}">
                        <input type="radio" name="q${qIndex}" value="${i}" onchange="updateSelection('q${qIndex}')">
                        <span class="custom-radio"></span>
                        <span>${['A', 'B', 'C', 'D'][i]}. ${opt}</span>
                    </label>
                `;
            });

            qDiv.innerHTML = `
                <span class="section-badge">${section}</span>
                <div class="question-title">${qIndex + 1}. ${q.q}</div>
                <div class="options-container">${optionsHTML}</div>
                <div class="explanation" id="exp-${qIndex}"></div>
            `;
            wrapper.appendChild(qDiv);
            qIndex++;
        });
    }
}

// 點擊選項時的高亮效果
window.updateSelection = function(groupName) {
    const labels = document.querySelectorAll(`input[name="${groupName}"]`);
    labels.forEach((radio, idx) => {
        const parent = document.getElementById(`label-${groupName}-opt${idx}`);
        if(radio.checked) {
            parent.classList.add('selected');
        } else {
            parent.classList.remove('selected');
        }
    });
    // 隱藏錯誤提示（如果有的話）
    document.getElementById('error-msg').style.display = 'none';
}

window.submitQuiz = function() {
    let score = 0;
    let allAnswered = true;

    selectedQuestions.forEach((q, index) => {
        const selectedOption = document.querySelector(`input[name="q${index}"]:checked`);
        if (!selectedOption) {
            allAnswered = false;
        }
    });

    if (!allAnswered) {
        document.getElementById('error-msg').style.display = 'block';
        return;
    }

    selectedQuestions.forEach((q, index) => {
        const selectedOption = document.querySelector(`input[name="q${index}"]:checked`);
        const expDiv = document.getElementById(`exp-${index}`);
        const userAnswer = parseInt(selectedOption.value);
        
        let resultHTML = '';
        
        if (userAnswer === q.ans) {
            score += 10;
            resultHTML += `<div class="correct-ans"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> 答對了！正確答案是：${['A','B','C','D'][q.ans]}</div>`;
        } else {
            resultHTML += `<div class="wrong-ans">✘ 答錯了。您選擇 ${['A','B','C','D'][userAnswer]}</div>`;
            resultHTML += `<div class="correct-ans" style="color: #0056b3;">正確答案是：${['A','B','C','D'][q.ans]}</div>`;
        }
        resultHTML += `<div class="exp-text"><strong>💡 解析：</strong>${q.exp}</div>`;
        expDiv.innerHTML = resultHTML;
        expDiv.style.display = 'block';
        
        // 鎖定表單，標示正確答案
        const radios = document.querySelectorAll(`input[name="q${index}"]`);
        radios.forEach((r, idx) => {
            r.disabled = true;
            const label = document.getElementById(`label-q${index}-opt${idx}`);
            if(idx === q.ans) {
                label.style.borderColor = "var(--success)";
                label.style.backgroundColor = "#e6f4ea";
            }
        });
    });

    // 顯示分數與結果
    document.getElementById('submit-btn').style.display = 'none';
    const resultContainer = document.getElementById('result-container');
    const finalScore = document.getElementById('final-score');
    const resultStatus = document.getElementById('result-status');
    const resultMsg = document.getElementById('result-msg');

    resultContainer.style.display = 'block';
    finalScore.innerText = score + ' 分';

    if (score >= 90) {
        resultContainer.className = 'pass';
        resultStatus.innerText = '🎉 恭喜通過測驗！';
        resultMsg.innerText = '您已完全掌握 4K高清肌水光療程的專業知識與銷售心法。';
    } else {
        resultContainer.className = 'fail';
        resultStatus.innerText = '⚠ 未達及格標準';
        resultMsg.innerText = '請查閱上方錯誤題目的解析，並重新複習 SOP 與教戰手冊後再次挑戰！';
    }
    
    // 平滑捲動到底部觀看成績
    setTimeout(() => {
        resultContainer.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }, 100);
}

// 初始化執行
window.onload = generateQuiz;
</script>
